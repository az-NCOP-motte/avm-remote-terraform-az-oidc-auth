parameters:
  inputFile: ""
  outputFile: ""

steps:
  - task: AzureCLI@2
    displayName: Build PR Comment File
    inputs:
      azureSubscription: $(service-connection)
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        INPUT_TEXT_FILE="${{ parameters.inputFile }}"
        OUTPUT_FILE="${{ parameters.outputFile }}"

        echo "📘 Reading Terraform plan from: $INPUT_TEXT_FILE"

        # Read entire plan
        PLAN_CONTENT="$(cat "$INPUT_TEXT_FILE")"

        # Count resource operations
        ADDS=$(grep -E '^[[:space:]]*\+' "$INPUT_TEXT_FILE" | wc -l || true)
        CHANGES=$(grep -E '^[[:space:]]*~' "$INPUT_TEXT_FILE" | wc -l || true)
        DESTROYS=$(grep -E '^[[:space:]]*-' "$INPUT_TEXT_FILE" | wc -l || true)

        SUMMARY=""
        [ "$ADDS" -gt 0 ] && SUMMARY+="🟩 **Additions:** $ADDS"$'\n'
        [ "$CHANGES" -gt 0 ] && SUMMARY+="🟨 **Changes:** $CHANGES"$'\n'
        [ "$DESTROYS" -gt 0 ] && SUMMARY+="🟥 **Destructions:** $DESTROYS"$'\n'

        if [ -z "$SUMMARY" ]; then
          SUMMARY="✅ **No infrastructure changes detected.**"
        fi

        # Build beautiful markdown block
        MARKDOWN=$(cat << 'EOF'
        ## Terraform Plan

        ---

        <details>
        <summary> Full Terraform Plan Output (click to expand)</summary>

        ``````hcl
        __PLAN__
        ``````

        </details>
        
        EOF
        )

        # Inject summary + plan into the markdown template
        MARKDOWN="${MARKDOWN/__SUMMARY__/$SUMMARY}"
        MARKDOWN="${MARKDOWN/__PLAN__/$PLAN_CONTENT}"

        echo "✅ Writing JSON payload to: $OUTPUT_FILE"

        # Build JSON using jq
        jq -n --arg content "$MARKDOWN" '
        {
          comments: [
            {
              parentCommentId: 0,
              content: $content,
              commentType: 1
            }
          ],
          status: 1
        }
        ' > "$OUTPUT_FILE"

        echo "✅ $OUTPUT_FILE built successfully."